# Load local env files for dev runs (IDE/terminal) when present.
spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties]

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cesta_inteligente_tcc}?sslmode=${DB_SSLMODE:disable}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

